server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: ledger-api
    static_configs:
      - targets: [localhost]
        labels:
          job: ledger-api
          app: ledger-api
          __path__: /var/log/ledger/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            timestamp: timestamp
            target: target
      - labels:
          level:
          target:
      - timestamp:
          source: timestamp
          format: RFC3339Nano
