name: ledger

# Profiles:
#   infra → postgres, loki, grafana, promtail
#   app   → everything in infra plus the API and the web app
# Pick one with `docker compose --profile <name> up -d`.

services:
  postgres:
    image: postgres:16-alpine
    container_name: ledger-postgres
    profiles: ["infra", "app"]
    environment:
      POSTGRES_DB: ledger
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d ledger"]
      interval: 2s
      timeout: 5s
      retries: 20

  loki:
    image: grafana/loki:3.0.0
    container_name: ledger-loki
    profiles: ["infra", "app"]
    command: -config.file=/etc/loki/config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki

  grafana:
    image: grafana/grafana:11.1.0
    container_name: ledger-grafana
    profiles: ["infra", "app"]
    depends_on:
      - loki
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    ports:
      - "3001:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana

  promtail:
    image: grafana/promtail:3.0.0
    container_name: ledger-promtail
    profiles: ["infra", "app"]
    depends_on:
      - loki
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
      - ../api/logs:/var/log/ledger:ro

  api:
    build:
      context: ..
      dockerfile: infra/api.Dockerfile
    container_name: ledger-api
    profiles: ["app"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_CONFIG__DATABASE_URL: postgres://ledger:ledger@postgres:5432/ledger
      SERVER_CONFIG__PORT: "4000"
      SERVER_CONFIG__CORS_ALLOW_ORIGIN: http://localhost:3000
      RUST_LOG: ledger_api=info,sqlx=warn
    ports:
      - "4000:4000"
    volumes:
      - ../api/logs:/app/logs

  web:
    build:
      context: ..
      dockerfile: infra/web.Dockerfile
    container_name: ledger-web
    profiles: ["app"]
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"

volumes:
  postgres-data:
  loki-data:
  grafana-data:
